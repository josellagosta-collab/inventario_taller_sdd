{% extends "base.html" %}

{% block title %}
{{ titulo }}
{% endblock %}

{% block content %}

<h1>{{ titulo }}</h1>

<div class="card shadow">
    <div class="card-header bg-success text-white">
        {{ titulo }}
    </div>

    <div class="card-body">

        <form method="post">

            {% csrf_token %}

            {% for field in form %}

                <div class="mb-3">

                    <label class="form-label">
                        {{ field.label }}
                    </label>

                    {{ field }}

                    {% if field.errors %}
                        <div class="text-danger mt-1">
                            {{ field.errors }}
                        </div>
                    {% endif %}

                </div>

            {% endfor %}

            <div class="mt-3">
                <button type="submit" class="btn btn-primary">
                    {{ texto_boton }}
                </button>

                <a href="{% url 'ubicaciones:lista_ubicaciones' %}"
                   class="btn btn-secondary">
                    Cancelar
                </a>
            </div>

        </form>

    </div>
</div>

{% endblock %}
