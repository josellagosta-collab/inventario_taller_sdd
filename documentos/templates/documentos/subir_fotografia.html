{% extends "base.html" %}

{% block title %}
Subir fotografía
{% endblock %}

{% block content %}

<h1>Subir fotografía</h1>

<div class="card shadow">
    <div class="card-header bg-primary text-white">
        {{ material.nombre }}
    </div>

    <div class="card-body">
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}

            {% for field in form %}
                <div class="mb-3">
                    <label class="form-label">
                        {{ field.label }}
                    </label>

                    {{ field }}

                    {% if field.errors %}
                        <div class="text-danger mt-1">
                            {{ field.errors }}
                        </div>
                    {% endif %}
                </div>
            {% endfor %}

            <div class="mt-3">
                <button type="submit" class="btn btn-primary">
                    Subir fotografía
                </button>

                <a href="{% url 'inventario:detalle_material' material.id %}"
                   class="btn btn-secondary">
                    Cancelar
                </a>
            </div>
        </form>
    </div>
</div>

{% endblock %}
