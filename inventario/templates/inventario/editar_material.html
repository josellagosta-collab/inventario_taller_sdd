{% extends "base.html" %}

{% block title %}
Editar material
{% endblock %}

{% block content %}

<h1>Editar material</h1>

<h4>{{ material.nombre }}</h4>

<form method="post" class="card p-4">

    {% csrf_token %}

    {{ form.as_p }}

    <div class="mt-3">
        <button type="submit" class="btn btn-primary">
            Guardar cambios
        </button>

        <a href="{% url 'inventario:detalle_material' material.id %}" class="btn btn-secondary">
            Cancelar
        </a>
    </div>

</form>

{% endblock %}
