{% extends "base.html" %}

{% block title %}
Editar material
{% endblock %}

{% block content %}

<h1>Editar material</h1>

<div class="card shadow">

    <div class="card-header bg-warning text-dark">
        Editando: {{ material.nombre }}
    </div>

    <div class="card-body">

        <form method="post">

            {% csrf_token %}

            {% for field in form %}

                <div class="mb-3">

                    <label class="form-label">
                        {{ field.label }}
                    </label>

                    {{ field }}

                    {% if field.errors %}
                        <div class="text-danger mt-1">
                            {{ field.errors }}
                        </div>
                    {% endif %}

                </div>

            {% endfor %}

            <div class="mt-3">

                <button type="submit" class="btn btn-primary">
                    Guardar cambios
                </button>

                <a href="{% url 'inventario:detalle_material' material.id %}"
                   class="btn btn-secondary">
                    Cancelar
                </a>

            </div>

        </form>

    </div>

</div>

{% endblock %}
