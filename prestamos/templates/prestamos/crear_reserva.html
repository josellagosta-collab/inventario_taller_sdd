{% extends "base.html" %}

{% block title %}
Nueva reserva
{% endblock %}

{% block content %}

<h1>Nueva reserva</h1>

<div class="card shadow">

    <div class="card-header bg-primary text-white">
        Reservar material
    </div>

    <div class="card-body">

        <form method="post">
            {% csrf_token %}

            {% for field in form %}

                <div class="mb-3">
                    <label class="form-label">
                        {{ field.label }}
                    </label>

                    {{ field }}

                    {% if field.errors %}
                        <div class="text-danger mt-1">
                            {{ field.errors }}
                        </div>
                    {% endif %}
                </div>

            {% endfor %}

            <button type="submit" class="btn btn-primary">
                Guardar reserva
            </button>

            <a href="{% url 'inventario:dashboard' %}"
               class="btn btn-secondary">
                Cancelar
            </a>

        </form>

    </div>

</div>

{% endblock %}
